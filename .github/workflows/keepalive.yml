name: Keep Wardrobe Wizard Awake
on:
  schedule:
    - cron: '*/30 * * * *'  # Every 30 minutes
  workflow_dispatch:  # Manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
    - name: Ping App
      run: |
        RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" https://yourapp.streamlit.app/)
        echo "HTTP Status: $RESPONSE"
        if [ "$RESPONSE" = "200" ]; then
          echo "✅ Wardrobe Wizard is awake!"
        else
          echo "❌ App returned status $RESPONSE"
        fi
